services:
  nginx:
    image: nginx:alpine
    container_name: load-balancer
    ports:
      - "${PUBLIC_PORT:-8080}:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./frontend:/usr/share/nginx/html:ro
    depends_on:
      - backend1
      - backend2
      - backend3
    networks:
      - web-network
    restart: unless-stopped

  mysql:
    image: mysql:8.4
    container_name: inventario-mysql
    environment:
      MYSQL_ALLOW_EMPTY_PASSWORD: "yes"
      MYSQL_ROOT_PASSWORD: "${MYSQL_ROOT_PASSWORD:-}"
      MYSQL_DATABASE: "${DB_NAME:-inventario_productos}"
    ports:
      - "${MYSQL_PUBLIC_PORT:-3307}:3306"
    volumes:
      - mysql-data:/var/lib/mysql
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - web-network
    restart: unless-stopped

  backend1:
    build:
      context: ./backends
      dockerfile: app1/Dockerfile
    container_name: backend-1
    environment:
      SERVER_ID: backend-1
      PORT: "${PORT:-3000}"
      DB_HOST: mysql
      DB_USER: "${DB_USER:-root}"
      DB_PASSWORD: "${DB_PASSWORD:-}"
      DB_NAME: "${DB_NAME:-inventario_productos}"
      DB_PORT: 3306
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - web-network
    restart: unless-stopped

  backend2:
    build:
      context: ./backends
      dockerfile: app2/Dockerfile
    container_name: backend-2
    environment:
      SERVER_ID: backend-2
      PORT: "${PORT:-3000}"
      DB_HOST: mysql
      DB_USER: "${DB_USER:-root}"
      DB_PASSWORD: "${DB_PASSWORD:-}"
      DB_NAME: "${DB_NAME:-inventario_productos}"
      DB_PORT: 3306
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - web-network
    restart: unless-stopped

  backend3:
    build:
      context: ./backends
      dockerfile: app3/Dockerfile
    container_name: backend-3
    environment:
      SERVER_ID: backend-3
      PORT: "${PORT:-3000}"
      DB_HOST: mysql
      DB_USER: "${DB_USER:-root}"
      DB_PASSWORD: "${DB_PASSWORD:-}"
      DB_NAME: "${DB_NAME:-inventario_productos}"
      DB_PORT: 3306
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - web-network
    restart: unless-stopped

  nginx-exporter:
    image: nginx/nginx-prometheus-exporter:latest
    container_name: nginx-exporter
    command:
      - --nginx.scrape-uri=http://nginx:80/nginx_status
    ports:
      - "9113:9113"
    depends_on:
      - nginx
    networks:
      - web-network
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    depends_on:
      - nginx-exporter
    networks:
      - web-network
    restart: unless-stopped

  artillery:
    image: artilleryio/artillery:latest
    container_name: artillery-runner
    volumes:
      - ./artillery:/scripts
    networks:
      - web-network
    profiles:
      - testing
    command: >
      run --output /scripts/report.json /scripts/load-test.yml
    depends_on:
      - nginx
    ulimits:
      nofile:
        soft: 65536
        hard: 65536

networks:
  web-network:
    name: balanceo-network
    driver: bridge

volumes:
  mysql-data:
