services:

  # ─── Balanceador de carga ─────────────────────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: load-balancer
    ports:
      - "${PUBLIC_PORT:-8080}:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend1
      - backend2
      - backend3
    networks:
      - web-network
    restart: unless-stopped

  # ─── Backends ─────────────────────────────────────────────────────────────
  backend1:
    build: ./backends/app1
    container_name: backend-1
    environment:
      - SERVER_ID=backend-1
      - PORT=3000
    networks:
      - web-network
    restart: unless-stopped

  backend2:
    build: ./backends/app2
    container_name: backend-2
    environment:
      - SERVER_ID=backend-2
      - PORT=3000
    networks:
      - web-network
    restart: unless-stopped

  backend3:
    build: ./backends/app3
    container_name: backend-3
    environment:
      - SERVER_ID=backend-3
      - PORT=3000
    networks:
      - web-network
    restart: unless-stopped

  # ─── Métricas: nginx-prometheus-exporter ──────────────────────────────────
  nginx-exporter:
    image: nginx/nginx-prometheus-exporter:latest
    container_name: nginx-exporter
    command:
      - --nginx.scrape-uri=http://nginx:80/nginx_status
    ports:
      - "9113:9113"
    depends_on:
      - nginx
    networks:
      - web-network
    restart: unless-stopped

  # ─── Métricas: Prometheus ─────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    depends_on:
      - nginx-exporter
    networks:
      - web-network
    restart: unless-stopped

  # ─── Pruebas de carga: Artillery ──────────────────────────────────────────
  artillery:
    image: artilleryio/artillery:latest
    container_name: artillery-runner
    volumes:
      - ./artillery:/scripts
    networks:
      - web-network
    profiles:
      - testing
    command: >
      run --output /scripts/report.json /scripts/load-test.yml
    depends_on:
      - nginx
    ulimits:
      nofile:
        soft: 65536
        hard: 65536

networks:
  web-network:
    name: balanceo-network
    driver: bridge