<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Inventario de Productos</title>
  <style>
    :root {
      --bg: #f5f8fc;
      --surface: #ffffff;
      --text: #06152f;
      --muted: #52627a;
      --line: #dce3ee;
      --blue: #155dfc;
      --blue-dark: #0f4bd6;
      --blue-soft: #dbeafe;
      --green: #009a44;
      --amber: #c77700;
      --red: #e11d48;
      --shadow: 0 8px 24px rgba(15, 23, 42, 0.08);
      --radius: 8px;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Segoe UI", system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
      color: var(--text);
      background: linear-gradient(120deg, #f3f8ff 0%, #ffffff 55%, #fbf7ff 100%);
    }

    button,
    input,
    select,
    textarea {
      font: inherit;
    }

    button {
      cursor: pointer;
    }

    .app {
      width: min(1250px, calc(100% - 32px));
      margin: 0 auto;
      padding: 34px 0 64px;
    }

    .header {
      display: flex;
      align-items: flex-start;
      gap: 12px;
      margin-bottom: 30px;
    }

    .logo {
      width: 34px;
      height: 34px;
      color: var(--blue);
      flex: 0 0 auto;
      margin-top: 7px;
    }

    h1 {
      margin: 0;
      font-size: clamp(30px, 3vw, 38px);
      line-height: 1.1;
      letter-spacing: 0;
    }

    .subtitle {
      margin: 8px 0 0;
      color: var(--muted);
      font-size: 15px;
    }

    .toolbar {
      display: grid;
      grid-template-columns: minmax(220px, 1fr) 160px auto;
      gap: 16px;
      align-items: start;
      background: var(--surface);
      border: 1px solid #edf1f7;
      border-radius: var(--radius);
      padding: 24px;
      box-shadow: var(--shadow);
      margin-bottom: 24px;
    }

    .search,
    .select,
    .input,
    .textarea {
      width: 100%;
      border: 1px solid #cbd5e1;
      border-radius: var(--radius);
      color: var(--text);
      background: #fff;
      outline: none;
      transition: border-color 0.15s ease, box-shadow 0.15s ease;
    }

    .search,
    .select,
    .input {
      height: 43px;
      padding: 0 16px;
    }

    .textarea {
      min-height: 90px;
      padding: 12px 16px;
      resize: vertical;
    }

    .search:focus,
    .select:focus,
    .input:focus,
    .textarea:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 3px rgba(21, 93, 252, 0.12);
    }

    .primary-btn,
    .secondary-btn,
    .danger-btn {
      height: 43px;
      border-radius: var(--radius);
      border: 1px solid transparent;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 9px;
      padding: 0 22px;
      font-weight: 700;
      white-space: nowrap;
    }

    .primary-btn {
      background: var(--blue);
      color: #fff;
    }

    .primary-btn:hover {
      background: var(--blue-dark);
    }

    .secondary-btn {
      background: #fff;
      color: var(--text);
      border-color: #cbd5e1;
    }

    .danger-btn {
      background: var(--red);
      color: #fff;
    }

    .stats {
      grid-column: 1 / -1;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 16px;
      color: #243550;
      font-size: 14px;
    }

    .status-message {
      min-height: 22px;
      margin: -8px 0 18px;
      font-size: 14px;
      color: var(--muted);
    }

    .status-message.success {
      color: var(--green);
    }

    .status-message.error {
      color: var(--red);
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 24px;
    }

    .card {
      background: var(--surface);
      border: 1px solid #edf1f7;
      border-radius: var(--radius);
      min-height: 240px;
      padding: 24px;
      box-shadow: var(--shadow);
      display: flex;
      flex-direction: column;
    }

    .card-head {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 14px;
    }

    .product-title {
      margin: 0 0 8px;
      font-size: 21px;
      line-height: 1.25;
      letter-spacing: 0;
    }

    .tag {
      display: inline-flex;
      align-items: center;
      min-height: 24px;
      padding: 3px 8px;
      color: #0f4bd6;
      background: var(--blue-soft);
      border-radius: 4px;
      font-size: 12px;
    }

    .actions {
      display: flex;
      gap: 14px;
      flex: 0 0 auto;
    }

    .icon-btn {
      border: 0;
      padding: 0;
      width: 24px;
      height: 24px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      background: transparent;
      color: var(--blue);
      border-radius: 4px;
    }

    .icon-btn:hover {
      background: #eff6ff;
    }

    .icon-btn.delete {
      color: #ff0f2f;
    }

    .description {
      margin: 18px 0;
      color: #253954;
      font-size: 14px;
      line-height: 1.55;
      min-height: 44px;
    }

    .card-footer {
      margin-top: auto;
      padding-top: 20px;
      border-top: 1px solid var(--line);
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
      gap: 12px;
    }

    .price {
      font-size: 24px;
      font-weight: 800;
      letter-spacing: 0;
    }

    .stock {
      text-align: right;
      color: var(--muted);
      font-size: 13px;
    }

    .stock strong {
      display: block;
      margin-top: 4px;
      color: var(--green);
      font-size: 15px;
    }

    .stock.low strong {
      color: var(--amber);
    }

    .empty {
      grid-column: 1 / -1;
      background: var(--surface);
      border: 1px dashed #cbd5e1;
      border-radius: var(--radius);
      padding: 42px 24px;
      text-align: center;
      color: var(--muted);
    }

    .modal-backdrop {
      position: fixed;
      inset: 0;
      display: none;
      align-items: center;
      justify-content: center;
      background: rgba(15, 23, 42, 0.4);
      padding: 20px;
      z-index: 10;
    }

    .modal-backdrop.open {
      display: flex;
    }

    .modal {
      width: min(440px, 100%);
      max-height: calc(100vh - 40px);
      overflow: auto;
      background: var(--surface);
      border-radius: var(--radius);
      box-shadow: 0 24px 80px rgba(15, 23, 42, 0.25);
    }

    .modal-header {
      padding: 22px 20px;
      border-bottom: 1px solid var(--line);
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
    }

    .modal-title {
      margin: 0;
      font-size: 24px;
      letter-spacing: 0;
    }

    .close-btn {
      border: 0;
      background: transparent;
      width: 32px;
      height: 32px;
      color: #111827;
      border-radius: 4px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }

    .close-btn:hover {
      background: #f1f5f9;
    }

    .form {
      padding: 24px 20px 20px;
    }

    .field {
      margin-bottom: 16px;
    }

    .field label {
      display: block;
      margin-bottom: 7px;
      font-size: 14px;
      font-weight: 700;
    }

    .form-error {
      color: var(--red);
      min-height: 20px;
      font-size: 13px;
      margin-bottom: 12px;
    }

    .modal-actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-top: 6px;
    }

    .confirm-text {
      margin: 0 0 18px;
      color: var(--muted);
      line-height: 1.5;
    }

    .loader {
      opacity: 0.65;
      pointer-events: none;
    }

    @media (max-width: 900px) {
      .toolbar {
        grid-template-columns: 1fr;
      }

      .stats {
        align-items: flex-start;
        flex-direction: column;
      }

      .grid {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }
    }

    @media (max-width: 620px) {
      .app {
        width: min(100% - 24px, 1250px);
        padding-top: 24px;
      }

      .header {
        margin-bottom: 22px;
      }

      .grid {
        grid-template-columns: 1fr;
      }

      .toolbar,
      .card {
        padding: 18px;
      }

      .modal-actions {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <main class="app">
    <header class="header">
      <svg class="logo" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
        <path d="m21 16-9 5-9-5V8l9-5 9 5v8Z"></path>
        <path d="m3.3 7.7 8.7 5 8.7-5"></path>
        <path d="M12 22V12"></path>
      </svg>
      <div>
        <h1>Inventario de Productos</h1>
        <p class="subtitle">Gestiona tu catalogo de productos tecnologicos</p>
      </div>
    </header>

    <section class="toolbar" aria-label="Filtros de productos">
      <input id="searchInput" class="search" type="search" placeholder="Buscar productos..." autocomplete="off">
      <select id="categoryFilter" class="select" aria-label="Filtrar por categoria">
        <option value="">Todas</option>
      </select>
      <button id="openCreateBtn" class="primary-btn" type="button">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
          <path d="M5 12h14"></path>
          <path d="M12 5v14"></path>
        </svg>
        Nuevo Producto
      </button>
      <div class="stats">
        <span id="foundCount">0 producto(s) encontrado(s)</span>
        <span id="stockTotal">Total en inventario: 0 unidades</span>
      </div>
    </section>

    <div id="statusMessage" class="status-message" role="status"></div>
    <section id="productsGrid" class="grid" aria-live="polite"></section>
  </main>

  <div id="productModal" class="modal-backdrop" aria-hidden="true">
    <article class="modal" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
      <header class="modal-header">
        <h2 id="modalTitle" class="modal-title">Nuevo Producto</h2>
        <button id="closeModalBtn" class="close-btn" type="button" aria-label="Cerrar">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
            <path d="M18 6 6 18"></path>
            <path d="m6 6 12 12"></path>
          </svg>
        </button>
      </header>
      <form id="productForm" class="form" novalidate>
        <input id="productId" type="hidden">
        <div class="field">
          <label for="productName">Nombre del Producto</label>
          <input id="productName" class="input" type="text" maxlength="150" placeholder="Ej: Laptop Dell XPS 15">
        </div>
        <div class="field">
          <label for="productCategory">Categoria</label>
          <select id="productCategory" class="select"></select>
        </div>
        <div class="field">
          <label for="productPrice">Precio ($)</label>
          <input id="productPrice" class="input" type="number" min="0" step="0.01" placeholder="0.00">
        </div>
        <div class="field">
          <label for="productStock">Stock (unidades)</label>
          <input id="productStock" class="input" type="number" min="0" step="1" placeholder="0">
        </div>
        <div class="field">
          <label for="productDescription">Descripcion</label>
          <textarea id="productDescription" class="textarea" placeholder="Descripcion del producto..."></textarea>
        </div>
        <div id="formError" class="form-error"></div>
        <div class="modal-actions">
          <button id="cancelModalBtn" class="secondary-btn" type="button">Cancelar</button>
          <button id="submitProductBtn" class="primary-btn" type="submit">Crear Producto</button>
        </div>
      </form>
    </article>
  </div>

  <div id="deleteModal" class="modal-backdrop" aria-hidden="true">
    <article class="modal" role="dialog" aria-modal="true" aria-labelledby="deleteTitle">
      <header class="modal-header">
        <h2 id="deleteTitle" class="modal-title">Eliminar Producto</h2>
        <button id="closeDeleteBtn" class="close-btn" type="button" aria-label="Cerrar">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
            <path d="M18 6 6 18"></path>
            <path d="m6 6 12 12"></path>
          </svg>
        </button>
      </header>
      <div class="form">
        <p id="deleteText" class="confirm-text"></p>
        <div class="modal-actions">
          <button id="cancelDeleteBtn" class="secondary-btn" type="button">Cancelar</button>
          <button id="confirmDeleteBtn" class="danger-btn" type="button">Eliminar</button>
        </div>
      </div>
    </article>
  </div>

  <script>
    const API_URL = '/api/productos';
    const CATEGORIES = ['Computadoras', 'Smartphones', 'Tablets', 'Audio', 'Accesorios', 'Otros'];

    const state = {
      products: [],
      editingProduct: null,
      deletingProduct: null,
      search: '',
      category: '',
      loading: false,
    };

    const elements = {
      grid: document.getElementById('productsGrid'),
      searchInput: document.getElementById('searchInput'),
      categoryFilter: document.getElementById('categoryFilter'),
      foundCount: document.getElementById('foundCount'),
      stockTotal: document.getElementById('stockTotal'),
      statusMessage: document.getElementById('statusMessage'),
      productModal: document.getElementById('productModal'),
      modalTitle: document.getElementById('modalTitle'),
      productForm: document.getElementById('productForm'),
      productId: document.getElementById('productId'),
      productName: document.getElementById('productName'),
      productCategory: document.getElementById('productCategory'),
      productPrice: document.getElementById('productPrice'),
      productStock: document.getElementById('productStock'),
      productDescription: document.getElementById('productDescription'),
      formError: document.getElementById('formError'),
      submitProductBtn: document.getElementById('submitProductBtn'),
      deleteModal: document.getElementById('deleteModal'),
      deleteText: document.getElementById('deleteText'),
    };

    function formatCurrency(value) {
      return new Intl.NumberFormat('en-US', {
        style: 'currency',
        currency: 'USD',
      }).format(Number(value || 0));
    }

    function escapeHtml(value) {
      return String(value || '')
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;')
        .replaceAll("'", '&#039;');
    }

    function showMessage(message, type = '') {
      elements.statusMessage.textContent = message;
      elements.statusMessage.className = `status-message ${type}`.trim();

      if (type === 'success') {
        window.setTimeout(() => {
          elements.statusMessage.textContent = '';
          elements.statusMessage.className = 'status-message';
        }, 3500);
      }
    }

    function setLoading(isLoading) {
      state.loading = isLoading;
      document.body.classList.toggle('loader', isLoading);
    }

    function fillCategoryOptions() {
      const options = CATEGORIES.map((category) => `<option value="${category}">${category}</option>`).join('');
      elements.categoryFilter.innerHTML = `<option value="">Todas</option>${options}`;
      elements.productCategory.innerHTML = options;
    }

    function buildQuery() {
      const params = new URLSearchParams();
      if (state.search) params.set('search', state.search);
      if (state.category) params.set('categoria', state.category);
      return params.toString();
    }

    async function requestJson(url, options = {}) {
      const response = await fetch(url, {
        headers: {
          'Content-Type': 'application/json',
          ...(options.headers || {}),
        },
        ...options,
      });

      const payload = await response.json();

      if (!response.ok || payload.success === false) {
        throw new Error(payload.error || payload.message || 'Ocurrio un error inesperado');
      }

      return payload;
    }

    async function loadProducts() {
      setLoading(true);

      try {
        const query = buildQuery();
        const payload = await requestJson(query ? `${API_URL}?${query}` : API_URL);
        state.products = payload.data || [];
        renderProducts();
        showMessage('');
      } catch (error) {
        state.products = [];
        renderProducts();
        showMessage(`Error: ${error.message}`, 'error');
      } finally {
        setLoading(false);
      }
    }

    function renderProducts() {
      const totalProducts = state.products.length;
      const totalStock = state.products.reduce((total, product) => total + Number(product.stock || 0), 0);

      elements.foundCount.textContent = `${totalProducts} producto(s) encontrado(s)`;
      elements.stockTotal.textContent = `Total en inventario: ${totalStock} unidades`;

      if (!totalProducts) {
        elements.grid.innerHTML = '<div class="empty">No se encontraron productos con los filtros seleccionados.</div>';
        return;
      }

      elements.grid.innerHTML = state.products.map((product) => `
        <article class="card">
          <div class="card-head">
            <div>
              <h2 class="product-title">${escapeHtml(product.nombre)}</h2>
              <span class="tag">${escapeHtml(product.categoria)}</span>
            </div>
            <div class="actions">
              <button class="icon-btn" type="button" title="Editar producto" aria-label="Editar ${escapeHtml(product.nombre)}" data-action="edit" data-id="${product.id}">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
                  <path d="M12 20h9"></path>
                  <path d="M16.5 3.5a2.1 2.1 0 0 1 3 3L7 19l-4 1 1-4 12.5-12.5Z"></path>
                </svg>
              </button>
              <button class="icon-btn delete" type="button" title="Eliminar producto" aria-label="Eliminar ${escapeHtml(product.nombre)}" data-action="delete" data-id="${product.id}">
                <svg width="19" height="19" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
                  <path d="M3 6h18"></path>
                  <path d="M8 6V4h8v2"></path>
                  <path d="M19 6l-1 14H6L5 6"></path>
                  <path d="M10 11v6"></path>
                  <path d="M14 11v6"></path>
                </svg>
              </button>
            </div>
          </div>
          <p class="description">${escapeHtml(product.descripcion || 'Sin descripcion registrada.')}</p>
          <div class="card-footer">
            <span class="price">${formatCurrency(product.precio)}</span>
            <span class="stock ${Number(product.stock) <= 10 ? 'low' : ''}">Stock<strong>${Number(product.stock)} unidades</strong></span>
          </div>
        </article>
      `).join('');
    }

    function openProductModal(product = null) {
      state.editingProduct = product;
      elements.formError.textContent = '';
      elements.modalTitle.textContent = product ? 'Editar Producto' : 'Nuevo Producto';
      elements.submitProductBtn.textContent = product ? 'Guardar Cambios' : 'Crear Producto';
      elements.productId.value = product?.id || '';
      elements.productName.value = product?.nombre || '';
      elements.productCategory.value = product?.categoria || CATEGORIES[0];
      elements.productPrice.value = product?.precio ?? '';
      elements.productStock.value = product?.stock ?? '';
      elements.productDescription.value = product?.descripcion || '';
      elements.productModal.classList.add('open');
      elements.productModal.setAttribute('aria-hidden', 'false');
      elements.productName.focus();
    }

    function closeProductModal() {
      elements.productModal.classList.remove('open');
      elements.productModal.setAttribute('aria-hidden', 'true');
      elements.productForm.reset();
      state.editingProduct = null;
    }

    function openDeleteModal(product) {
      state.deletingProduct = product;
      elements.deleteText.textContent = `Seguro que deseas eliminar "${product.nombre}"? Esta accion no se puede deshacer.`;
      elements.deleteModal.classList.add('open');
      elements.deleteModal.setAttribute('aria-hidden', 'false');
    }

    function closeDeleteModal() {
      elements.deleteModal.classList.remove('open');
      elements.deleteModal.setAttribute('aria-hidden', 'true');
      state.deletingProduct = null;
    }

    function validateForm() {
      const nombre = elements.productName.value.trim();
      const categoria = elements.productCategory.value.trim();
      const precio = Number(elements.productPrice.value);
      const stock = Number(elements.productStock.value);
      const descripcion = elements.productDescription.value.trim();

      if (!nombre) return { error: 'El nombre del producto es obligatorio.' };
      if (!categoria) return { error: 'La categoria es obligatoria.' };
      if (!Number.isFinite(precio) || precio < 0) return { error: 'El precio debe ser un numero mayor o igual a 0.' };
      if (!Number.isInteger(stock) || stock < 0) return { error: 'El stock debe ser un numero entero mayor o igual a 0.' };

      return {
        product: {
          nombre,
          categoria,
          precio,
          stock,
          descripcion,
        },
      };
    }

    async function saveProduct(event) {
      event.preventDefault();
      const validation = validateForm();

      if (validation.error) {
        elements.formError.textContent = validation.error;
        return;
      }

      const isEditing = Boolean(state.editingProduct);
      const url = isEditing ? `${API_URL}/${state.editingProduct.id}` : API_URL;
      const method = isEditing ? 'PUT' : 'POST';

      try {
        setLoading(true);
        const payload = await requestJson(url, {
          method,
          body: JSON.stringify(validation.product),
        });
        closeProductModal();
        await loadProducts();
        showMessage(payload.message, 'success');
      } catch (error) {
        elements.formError.textContent = error.message;
      } finally {
        setLoading(false);
      }
    }

    async function deleteProduct() {
      if (!state.deletingProduct) return;

      try {
        setLoading(true);
        const payload = await requestJson(`${API_URL}/${state.deletingProduct.id}`, {
          method: 'DELETE',
        });
        closeDeleteModal();
        await loadProducts();
        showMessage(payload.message, 'success');
      } catch (error) {
        showMessage(`Error: ${error.message}`, 'error');
      } finally {
        setLoading(false);
      }
    }

    function debounce(callback, delay = 350) {
      let timeoutId;
      return (...args) => {
        window.clearTimeout(timeoutId);
        timeoutId = window.setTimeout(() => callback(...args), delay);
      };
    }

    elements.searchInput.addEventListener('input', debounce((event) => {
      state.search = event.target.value.trim();
      loadProducts();
    }));

    elements.categoryFilter.addEventListener('change', (event) => {
      state.category = event.target.value;
      loadProducts();
    });

    document.getElementById('openCreateBtn').addEventListener('click', () => openProductModal());
    document.getElementById('closeModalBtn').addEventListener('click', closeProductModal);
    document.getElementById('cancelModalBtn').addEventListener('click', closeProductModal);
    document.getElementById('closeDeleteBtn').addEventListener('click', closeDeleteModal);
    document.getElementById('cancelDeleteBtn').addEventListener('click', closeDeleteModal);
    document.getElementById('confirmDeleteBtn').addEventListener('click', deleteProduct);
    elements.productForm.addEventListener('submit', saveProduct);

    elements.grid.addEventListener('click', (event) => {
      const button = event.target.closest('button[data-action]');
      if (!button) return;

      const product = state.products.find((item) => item.id === Number(button.dataset.id));
      if (!product) return;

      if (button.dataset.action === 'edit') openProductModal(product);
      if (button.dataset.action === 'delete') openDeleteModal(product);
    });

    [elements.productModal, elements.deleteModal].forEach((modal) => {
      modal.addEventListener('click', (event) => {
        if (event.target !== modal) return;
        if (modal === elements.productModal) closeProductModal();
        if (modal === elements.deleteModal) closeDeleteModal();
      });
    });

    document.addEventListener('keydown', (event) => {
      if (event.key !== 'Escape') return;
      closeProductModal();
      closeDeleteModal();
    });

    fillCategoryOptions();
    loadProducts();
  </script>
</body>
</html>
